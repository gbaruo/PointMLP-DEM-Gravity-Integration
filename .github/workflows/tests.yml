name: CI on: push: branches: [ main, feat/adaptive-terrain-correction ] pull_request: branches: [ main ]

jobs: lint-and-test: runs-on: ubuntu-latest strategy: matrix: python-version: [3.8, 3.9, 3.10] steps: - uses: actions/checkout@v4 - name: Set up Python ${{ matrix.python-version }} uses: actions/setup-python@v4 with: python-version: ${{ matrix.python-version }} - name: Install dependencies run: | python -m pip install --upgrade pip pip install -e .[dev] pip install -r requirements.txt || true - name: Run black check run: black --check . || true - name: Run flake8 run: flake8 || true - name: Run tests run: pytest -q - name: Upload coverage if: success() uses: actions/upload-artifact@v4 with: name: coverage-report path: htmlcov
